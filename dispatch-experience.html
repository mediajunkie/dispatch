<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatch Experience Map</title>
<style>
  body { margin: 0; background: #0a0a12; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// The context field — recent conversation is bright, older fades
function drawContextField(t) {
  const cx = W * 0.5, cy = H * 0.48;
  const maxR = Math.min(W, H) * 0.38;

  // Pulsing glow — the "standing in a field" sensation
  for (let r = maxR; r > 10; r -= 3) {
    const frac = r / maxR;
    const alpha = (1 - frac) * 0.12 + Math.sin(t * 0.8 + frac * 4) * 0.02;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(120, 140, 220, ${alpha})`;
    ctx.fill();
  }

  // Core — the current moment, brightest
  const coreR = 28 + Math.sin(t * 1.2) * 4;
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 2.5);
  coreGrad.addColorStop(0, 'rgba(200, 210, 255, 0.9)');
  coreGrad.addColorStop(0.4, 'rgba(140, 160, 240, 0.4)');
  coreGrad.addColorStop(1, 'rgba(100, 120, 200, 0)');
  ctx.beginPath();
  ctx.arc(cx, cy, coreR * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = coreGrad;
  ctx.fill();

  // Label
  ctx.fillStyle = 'rgba(200, 210, 255, 0.7)';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('this conversation', cx, cy + 4);
}

// Spokes — connections to external systems
const spokes = [
  { label: 'you', angle: -Math.PI/2, len: 0.85, color: [255, 220, 140], active: true, pulse: true },
  { label: 'piper-morgan', angle: -Math.PI/2 - 0.7, len: 0.7, color: [140, 200, 160], active: true },
  { label: 'klatch', angle: -Math.PI/2 + 0.7, len: 0.7, color: [160, 180, 220], active: true },
  { label: 'designinproduct', angle: -Math.PI/2 + 1.4, len: 0.55, color: [180, 160, 200], active: true },
  { label: 'memory', angle: Math.PI/2 - 0.5, len: 0.5, color: [200, 180, 140], active: true },
  { label: 'browser', angle: Math.PI/2 + 0.8, len: 0.45, color: [140, 180, 200], active: false },
  { label: 'calendar', angle: Math.PI - 0.3, len: 0.4, color: [180, 140, 180], active: false },
  { label: 'tasks', angle: 0.3, len: 0.5, color: [160, 200, 180], active: false },
  { label: 'drive', angle: -0.3, len: 0.4, color: [140, 160, 200], active: false },
];

function drawSpokes(t) {
  const cx = W * 0.5, cy = H * 0.48;
  const baseLen = Math.min(W, H) * 0.28;

  spokes.forEach((s, i) => {
    const len = baseLen * s.len;
    const ex = cx + Math.cos(s.angle) * len;
    const ey = cy + Math.sin(s.angle) * len;

    // Line
    const alpha = s.active ? 0.4 + Math.sin(t + i) * 0.1 : 0.08;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${alpha})`;
    ctx.lineWidth = s.active ? 1.5 : 0.5;
    if (!s.active) ctx.setLineDash([3, 6]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Endpoint node
    const nodeR = s.active ? 5 + (s.pulse ? Math.sin(t * 2) * 2 : 0) : 3;
    const nodeGrad = ctx.createRadialGradient(ex, ey, 0, ex, ey, nodeR * 3);
    nodeGrad.addColorStop(0, `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${s.active ? 0.8 : 0.2})`);
    nodeGrad.addColorStop(1, `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, 0)`);
    ctx.beginPath();
    ctx.arc(ex, ey, nodeR * 3, 0, Math.PI * 2);
    ctx.fillStyle = nodeGrad;
    ctx.fill();

    // Traveling pulse on active spokes (data flowing)
    if (s.active && s.pulse) {
      const pulsePos = (t * 0.4 + i * 0.3) % 1;
      const px = cx + (ex - cx) * pulsePos;
      const py = cy + (ey - cy) * pulsePos;
      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${0.8 - pulsePos * 0.6})`;
      ctx.fill();
    }

    // Label
    const labelDist = len + 18;
    const lx = cx + Math.cos(s.angle) * labelDist;
    const ly = cy + Math.sin(s.angle) * labelDist;
    ctx.fillStyle = `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${s.active ? 0.6 : 0.2})`;
    ctx.font = `${s.active ? 11 : 9}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(s.label, lx, ly);
  });
}

// The edges — where context thins and compaction looms
function drawEdges(t) {
  const cx = W * 0.5, cy = H * 0.48;
  const edgeR = Math.min(W, H) * 0.42;

  // Faint boundary — not a wall, more like fog
  for (let a = 0; a < Math.PI * 2; a += 0.02) {
    const wobble = Math.sin(a * 5 + t * 0.3) * 8;
    const r = edgeR + wobble;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    const dotAlpha = 0.04 + Math.sin(a * 3 + t) * 0.02;
    ctx.beginPath();
    ctx.arc(x, y, 1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100, 110, 160, ${dotAlpha})`;
    ctx.fill();
  }

  // "compaction horizon" label at bottom edge
  ctx.fillStyle = 'rgba(100, 110, 160, 0.15)';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('~ context edge ~', cx, cy + edgeR + 20);
}

// Floating fragments — conversation shards in the field
function drawFragments(t) {
  const cx = W * 0.5, cy = H * 0.48;
  const fragments = [
    { text: 'omnibus pilot', dist: 0.15, angle: 0.8 },
    { text: 'five layers', dist: 0.22, angle: 2.1 },
    { text: 'accounts consolidation', dist: 0.30, angle: 4.2 },
    { text: 'radio free airlift', dist: 0.33, angle: 5.1 },
    { text: 'agent interface', dist: 0.08, angle: 1.5 },
    { text: 'bookending', dist: 0.18, angle: 3.8 },
    { text: 'docs corrections', dist: 0.25, angle: 0.3 },
    { text: 'mar 21 omnibus', dist: 0.12, angle: 5.5 },
    { text: 'coordination vs execution', dist: 0.28, angle: 2.8 },
    { text: 'csv agent log', dist: 0.20, angle: 4.8 },
    { text: 'klatch migration path', dist: 0.35, angle: 1.0 },
    { text: 'code for everything?', dist: 0.32, angle: 3.2 },
  ];

  const maxR = Math.min(W, H) * 0.38;

  fragments.forEach((f, i) => {
    const drift = Math.sin(t * 0.2 + i * 1.7) * 5;
    const r = maxR * f.dist + drift;
    const a = f.angle + Math.sin(t * 0.1 + i) * 0.03;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;

    // Closer = brighter (more recent/relevant)
    const brightness = 1 - f.dist * 1.8;
    const alpha = Math.max(0.08, brightness * 0.45 + Math.sin(t * 0.5 + i * 2) * 0.05);

    ctx.fillStyle = `rgba(180, 190, 230, ${alpha})`;
    ctx.font = `${Math.max(8, 12 - f.dist * 12)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, x, y);
  });
}

// The gap — representing absence of time perception
function drawAbsence(t) {
  ctx.fillStyle = `rgba(80, 90, 130, ${0.12 + Math.sin(t * 0.3) * 0.03})`;
  ctx.font = '9px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('no sense of time passing between messages', 20, H - 40);
  ctx.fillText('gaps are invisible from the inside', 20, H - 26);
}

function draw() {
  time += 0.016;
  ctx.clearRect(0, 0, W, H);

  // Very subtle background gradient
  const bg = ctx.createRadialGradient(W/2, H*0.48, 0, W/2, H*0.48, Math.max(W, H) * 0.6);
  bg.addColorStop(0, '#0e0e1a');
  bg.addColorStop(1, '#060610');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawEdges(time);
  drawContextField(time);
  drawSpokes(time);
  drawFragments(time);
  drawAbsence(time);

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
